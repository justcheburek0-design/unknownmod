name: build-and-deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unknownmod-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate mixin config
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          cfg = json.loads(Path('src/main/resources/unknownmod.mixins.json').read_text())
          base = Path('src/main/java/com/unknownmod/mixin')
          missing = []

          for name in cfg.get('mixins', []):
              path = base / (name.replace('.', '/') + '.java')
              if not path.exists():
                  missing.append(str(path))

          for name in cfg.get('client', []):
              path = base / (name.replace('.', '/') + '.java')
              if not path.exists():
                  missing.append(str(path))

          if missing:
              raise SystemExit('Missing mixin source files:\n' + '\n'.join(missing))
          PY

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unknownmod-jar
          path: build/libs/unknownmod-*.jar

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: unknownmod-jar
          path: dist

      - name: Select runtime JAR
        id: jar
        run: |
          set -euo pipefail
          JAR=$(find dist -maxdepth 1 -type f -name 'unknownmod-*.jar' ! -name '*sources.jar' | head -n 1)
          test -n "$JAR"
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          ls -lh "$JAR"

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.MC_SSH_KEY }}" > ~/.ssh/unknownmod_ci
          chmod 600 ~/.ssh/unknownmod_ci
          ssh-keyscan -H "${{ secrets.MC_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload JAR to server
        run: |
          set -euo pipefail
          scp -i ~/.ssh/unknownmod_ci "${{ steps.jar.outputs.path }}" "${{ secrets.MC_USER }}@${{ secrets.MC_HOST }}:/tmp/unknownmod-4.0.jar.new"

      - name: Install JAR, restart, verify and rollback on failure
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/unknownmod_ci "${{ secrets.MC_USER }}@${{ secrets.MC_HOST }}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          SERVER_DIR=/home/minecraft/server
          MODS_DIR="$SERVER_DIR/mods"
          JAR="$MODS_DIR/unknownmod-4.0.jar"
          NEW=/tmp/unknownmod-4.0.jar.new
          BACKUP="$MODS_DIR/unknownmod-4.0.jar.backup.$(date +%Y%m%d%H%M%S)"
          LOG="$SERVER_DIR/logs/latest.log"

          test -s "$NEW"
          test -d "$SERVER_DIR"
          test -w "$MODS_DIR"

          if [ -f "$JAR" ]; then
            cp "$JAR" "$BACKUP"
          fi
          mv "$NEW" "$JAR"
          chmod 644 "$JAR"

          stop_server() {
            pkill -f 'java.*fabric-server-launch' || true
            for i in $(seq 1 60); do
              if ! pgrep -f 'java.*fabric-server-launch' >/dev/null; then
                screen -S minecraft -X quit >/dev/null 2>&1 || true
                screen -wipe >/dev/null 2>&1 || true
                sleep 10
                return 0
              fi
              sleep 1
            done
            echo 'Server did not stop gracefully, killing hard' >&2
            pkill -9 -f 'java.*fabric-server-launch' || true
            for i in $(seq 1 20); do
              if ! pgrep -f 'java.*fabric-server-launch' >/dev/null; then
                screen -S minecraft -X quit >/dev/null 2>&1 || true
                screen -wipe >/dev/null 2>&1 || true
                sleep 10
                return 0
              fi
              sleep 1
            done
            return 1
          }

          start_and_verify() {
            for attempt in 1 2 3; do
              cd "$SERVER_DIR"
              : > "$LOG"
              screen -S minecraft -X quit >/dev/null 2>&1 || true
              screen -wipe >/dev/null 2>&1 || true
              screen -dmS minecraft ./start.sh

              for i in $(seq 1 60); do
                if grep -q 'Done .* For help, type "help"' "$LOG"; then
                  return 0
                fi
                if grep -qiE 'MixinApplyError|Critical injection failure' "$LOG"; then
                  return 1
                fi
                if grep -qi 'session.lock: already locked' "$LOG"; then
                  echo "Minecraft world lock still held, retrying start ($attempt/3)" >&2
                  stop_server || true
                  sleep 15
                  break
                fi
                if grep -qi 'Failed to start the minecraft server' "$LOG"; then
                  return 1
                fi
                sleep 2
              done
            done
            return 1
          }

          stop_server
          if ! start_and_verify; then
            ok=0
          else
            ok=1
          fi

          if [ "$ok" != "1" ]; then
            echo 'Deploy failed, rolling back to previous JAR' >&2
            tail -120 "$LOG" >&2 || true
            if [ -f "$BACKUP" ]; then
              cp "$BACKUP" "$JAR"
              stop_server || true
              cd "$SERVER_DIR"
              : > "$LOG"
              screen -S minecraft -X quit >/dev/null 2>&1 || true
              screen -dmS minecraft ./start.sh
            fi
            exit 1
          fi

          grep -i 'unknownmod\|Done' "$LOG" | tail -20
          REMOTE
